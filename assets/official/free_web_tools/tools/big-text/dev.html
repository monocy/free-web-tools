<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Text Standalone Dev Mode - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&family=Pacifico&family=Dela+Gothic+One&family=Sawarabi+Mincho&family=Kaushan+Script&display=swap" rel="stylesheet">
  <style>
    .font-mono-custom {
      font-family: 'Share Tech Mono', monospace;
    }
    :root {
      --bg-card: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-color: #00f0ff;
      --accent-glow-intensity: 0 0 10px rgba(0, 240, 255, 0.5);
    }
    .glass-panel {
      background: rgba(31, 41, 55, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .neon-shadow {
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 
                  0 0 20px 0 rgba(0, 240, 255, 0.15);
    }
    [v-cloak] {
      display: none;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

  <div id="app" v-cloak class="w-full max-w-4xl flex flex-col items-center">
    <!-- Dev Mode Notice -->
    <div class="mb-4 text-center text-xs text-cyan-400 font-mono tracking-wider w-full">
      [ STANDALONE DEV MODE ]
    </div>
    
    <tool-workspace v-if="translations" :settings="settings" :translations="translations" class="w-full"></tool-workspace>
    <div v-else class="text-center py-8">Loading translations...</div>
  </div>

  <script src="./js/workspace.js"></script>
  <script>
    const { createApp, ref, reactive } = Vue;

    createApp({
      components: {
        ToolWorkspace
      },
      setup() {
        const settings = reactive({
          lang: 'en',
          theme: 'dark',
          custom: {
            textContent: 'HELLO',
            textSize: 8,
            fontFamily: 'Outfit',
            textColor: '#00f0ff',
            effect: 'neon',
            animation: 'bounce',
            orientation: 'horizontal',
            scrollSpeed: 5
          }
        });

        const translations = ref(null);

        // Fetch local i18n.json
        fetch('./i18n.json')
          .then(res => {
            if (!res.ok) throw new Error('Fetch failed');
            return res.json();
          })
          .then(data => {
            translations.value = data;
          })
          .catch(err => {
            console.error('Failed to load i18n.json, falling back to mock translations:', err);
            // fallback
            translations.value = {
              en: {
                page_title: "Big Text - Free Web Tools",
                tool_title: "Big Text",
                text_size: "Text Size",
                font_family: "Font Family",
                text_color: "Text Color",
                text_effect: "Text Effect",
                orientation: "Orientation",
                animation: "Animation",
                scroll_speed: "Scroll Speed",
                placeholder: "Type your text here...",
                horizontal: "Horizontal",
                vertical: "Vertical",
                effect_none: "None",
                effect_shadow: "Shadow",
                effect_neon: "Neon Glow",
                effect_glass: "Glassmorphism",
                animation_none: "None",
                animation_bounce: "Bounce",
                animation_fade: "Fade In",
                animation_zoom: "Zoom",
                animation_scroll: "Scroll"
              },
              ja: {
                page_title: "大きなテキスト表示ツール - Free Web Tools",
                tool_title: "大きなテキスト表示",
                text_size: "文字サイズ",
                font_family: "フォント",
                text_color: "文字色",
                text_effect: "文字効果",
                orientation: "表示方向",
                animation: "アニメーション",
                scroll_speed: "スクロール速度",
                placeholder: "ここにテキストを入力してください...",
                horizontal: "横書き",
                vertical: "縦書き",
                effect_none: "なし",
                effect_shadow: "影",
                effect_neon: "ネオン",
                effect_glass: "ガラス風",
                animation_none: "なし",
                animation_bounce: "バウンド",
                animation_fade: "フェードイン",
                animation_zoom: "ズーム",
                animation_scroll: "スクロール"
              }
            };
          });

        return {
          settings,
          translations
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
