<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Stopwatch - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
    .font-mono-custom {
      font-family: 'Share Tech Mono', monospace;
    }
    .glass {
      background: rgba(30, 41, 59, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .neon-glow-blue {
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.5), 0 0 20px rgba(59, 130, 246, 0.3);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden relative">
  <!-- Background glow -->
  <div class="absolute w-[500px] h-[500px] rounded-full bg-teal-500/10 blur-[120px] top-[-10%] left-[-10%] pointer-events-none"></div>
  <div class="absolute w-[600px] h-[600px] rounded-full bg-blue-600/10 blur-[130px] bottom-[-20%] right-[-10%] pointer-events-none"></div>

  <div id="app" v-cloak class="w-full max-w-lg z-10">
    <!-- Back to portal link -->
    <div class="mb-4 flex justify-between items-center px-2">
      <a href="/" class="text-xs font-semibold text-slate-400 hover:text-blue-400 flex items-center gap-1 transition">
        &larr; ポータルに戻る
      </a>
      <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Tool // Stopwatch</span>
    </div>

    <div class="glass rounded-3xl p-6 sm:p-10 shadow-2xl flex flex-col items-center relative overflow-hidden">
      <!-- Main Digital Display -->
      <div class="flex flex-col items-center select-none py-6">
        <div class="text-5xl sm:text-7xl font-black font-mono-custom tracking-wider tabular-nums leading-none text-blue-500 neon-glow-blue">
          [[ formattedTime ]]
        </div>
      </div>

      <!-- Controls -->
      <div class="flex gap-4 w-full justify-center mt-6">
        <!-- Start / Pause Button -->
        <button v-if="!isRunning" @click="start"
                class="flex-1 bg-gradient-to-r from-blue-500 to-indigo-500 hover:brightness-110 active:scale-95 text-slate-950 font-extrabold py-3.5 px-6 rounded-2xl shadow-[0_0_15px_rgba(59,130,246,0.3)] transition">
          スタート
        </button>
        <button v-else @click="pause"
                class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 active:scale-95 font-bold py-3.5 px-6 rounded-2xl transition">
          一時停止
        </button>

        <!-- Lap Button -->
        <button :disabled="!isRunning" @click="lap"
                class="flex-1 bg-slate-800/40 hover:bg-slate-800 border border-slate-700 text-slate-300 font-bold py-3.5 px-6 rounded-2xl active:scale-95 disabled:opacity-30 disabled:pointer-events-none transition">
          ラップ
        </button>

        <!-- Reset Button -->
        <button @click="reset"
                class="px-5 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/20 active:scale-95 font-bold py-3.5 rounded-2xl transition">
          リセット
        </button>
      </div>

      <!-- Laps List -->
      <div class="w-full mt-8 border-t border-slate-800/80 pt-6">
        <div class="text-xs font-bold text-slate-500 tracking-wider uppercase mb-3 flex justify-between px-2">
          <span>ラップ</span>
          <span>ラップタイム / スプリットタイム</span>
        </div>
        
        <div v-if="laps.length === 0" class="text-sm text-slate-600 text-center py-6">
          ラップがありません
        </div>
        <div v-else class="max-h-48 overflow-y-auto space-y-2 pr-1 custom-scrollbar">
          <div v-for="(l, idx) in lapsReversed" :key="l.id"
               class="flex justify-between items-center bg-slate-900/50 border border-slate-800/50 hover:border-blue-500/30 px-4 py-3 rounded-xl transition text-sm">
            <span class="font-bold text-slate-400 font-mono-custom">#[[ laps.length - idx ]]</span>
            <div class="flex items-center gap-4 text-right">
              <span class="text-slate-400 font-mono-custom text-xs">+[[ l.lapFormatted ]]</span>
              <span class="font-bold text-blue-400 font-mono-custom text-base">[[ l.splitFormatted ]]</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <style>
    /* Minimal Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>

  <script>
    (() => {
      const { createApp, ref, computed } = Vue;

      createApp({
        compilerOptions: { delimiters: ['[[', ']]'] },
        setup() {
          const isRunning = ref(false);
          const elapsedTime = ref(0); // in ms
          const laps = ref([]);
          let lastLapTime = 0;
          let startTime = 0;
          let animationFrameId = null;

          const formatMs = (ms) => {
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            const milliseconds = Math.floor((ms % 1000) / 10);
            
            const mStr = String(minutes).padStart(2, '0');
            const sStr = String(seconds).padStart(2, '0');
            const msStr = String(milliseconds).padStart(2, '0');
            
            return `${mStr}:${sStr}.${msStr}`;
          };

          const formattedTime = computed(() => formatMs(elapsedTime.value));

          const lapsReversed = computed(() => {
            return [...laps.value].reverse();
          });

          const update = () => {
            elapsedTime.value = Date.now() - startTime;
            animationFrameId = requestAnimationFrame(update);
          };

          const start = () => {
            if (isRunning.value) return;
            isRunning.value = true;
            startTime = Date.now() - elapsedTime.value;
            animationFrameId = requestAnimationFrame(update);
          };

          const pause = () => {
            if (!isRunning.value) return;
            isRunning.value = false;
            cancelAnimationFrame(animationFrameId);
            elapsedTime.value = Date.now() - startTime;
          };

          const reset = () => {
            isRunning.value = false;
            cancelAnimationFrame(animationFrameId);
            elapsedTime.value = 0;
            laps.value = [];
            lastLapTime = 0;
          };

          const lap = () => {
            const currentTotal = elapsedTime.value;
            const currentLap = currentTotal - lastLapTime;
            
            laps.value.push({
              id: Date.now(),
              lapFormatted: formatMs(currentLap),
              splitFormatted: formatMs(currentTotal)
            });
            
            lastLapTime = currentTotal;
          };

          return {
            isRunning,
            formattedTime,
            laps,
            lapsReversed,
            start,
            pause,
            reset,
            lap
          };
        }
      }).mount('#app');
    })();
  </script>
</body>
</html>
