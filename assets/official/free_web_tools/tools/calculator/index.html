<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Calculator - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
    .font-mono-custom {
      font-family: 'Share Tech Mono', monospace;
    }
    .glass {
      background: rgba(30, 41, 59, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .neon-glow-teal {
      text-shadow: 0 0 10px rgba(20, 184, 166, 0.5), 0 0 20px rgba(20, 184, 166, 0.3);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden relative">
  <!-- Background glow -->
  <div class="absolute w-[500px] h-[500px] rounded-full bg-teal-500/10 blur-[120px] top-[-10%] left-[-10%] pointer-events-none"></div>
  <div class="absolute w-[600px] h-[600px] rounded-full bg-blue-600/10 blur-[130px] bottom-[-20%] right-[-10%] pointer-events-none"></div>

  <div id="app" v-cloak class="w-full max-w-md z-10">
    <!-- Back to portal link -->
    <div class="mb-4 flex justify-between items-center px-2">
      <a href="/" class="text-xs font-semibold text-slate-400 hover:text-teal-400 flex items-center gap-1 transition">
        &larr; ポータルに戻る
      </a>
      <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest">Tool // Calculator</span>
    </div>

    <div class="glass rounded-3xl p-6 sm:p-8 shadow-2xl flex flex-col relative overflow-hidden">
      <!-- Calculator Display -->
      <div class="w-full bg-slate-900/80 border border-slate-800 rounded-2xl p-4 mb-6 flex flex-col items-end justify-between min-h-[100px] select-all">
        <!-- History / Expression -->
        <div class="text-slate-500 text-sm font-semibold tracking-wider font-mono-custom truncate w-full text-right h-6">
          [[ expression ]]
        </div>
        <!-- Main Input/Result -->
        <div class="text-3xl sm:text-4xl font-bold font-mono-custom text-teal-400 tracking-wider w-full text-right truncate neon-glow-teal leading-none mt-2">
          [[ displayValue ]]
        </div>
      </div>

      <!-- Calculator Buttons Grid -->
      <div class="grid grid-cols-4 gap-3">
        <!-- Row 1 -->
        <button @click="clear" class="bg-rose-500/10 border border-rose-500/30 text-rose-400 hover:bg-rose-500/20 active:scale-95 py-4 rounded-xl font-bold text-lg transition">C</button>
        <button @click="backspace" class="bg-slate-800/80 border border-slate-700/50 text-slate-300 hover:bg-slate-700/80 active:scale-95 py-4 rounded-xl font-bold text-lg transition">⌫</button>
        <button @click="toggleSign" class="bg-slate-800/80 border border-slate-700/50 text-slate-300 hover:bg-slate-700/80 active:scale-95 py-4 rounded-xl font-bold text-lg transition">+/-</button>
        <button @click="appendOperator('/')" class="bg-teal-500/10 border border-teal-500/30 text-teal-400 hover:bg-teal-500/20 active:scale-95 py-4 rounded-xl font-bold text-xl transition">÷</button>

        <!-- Row 2 -->
        <button @click="appendNumber('7')" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">7</button>
        <button @click="appendNumber('8')" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">8</button>
        <button @click="appendNumber('9')" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">9</button>
        <button @click="appendOperator('*')" class="bg-teal-500/10 border border-teal-500/30 text-teal-400 hover:bg-teal-500/20 active:scale-95 py-4 rounded-xl font-bold text-xl transition">×</button>

        <!-- Row 3 -->
        <button @click="appendNumber('4')" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">4</button>
        <button @click="appendNumber('5')" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">5</button>
        <button @click="appendNumber('6')" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">6</button>
        <button @click="appendOperator('-')" class="bg-teal-500/10 border border-teal-500/30 text-teal-400 hover:bg-teal-500/20 active:scale-95 py-4 rounded-xl font-bold text-xl transition">-</button>

        <!-- Row 4 -->
        <button @click="appendNumber('1')" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">1</button>
        <button @click="appendNumber('2')" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">2</button>
        <button @click="appendNumber('3')" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">3</button>
        <button @click="appendOperator('+')" class="bg-teal-500/10 border border-teal-500/30 text-teal-400 hover:bg-teal-500/20 active:scale-95 py-4 rounded-xl font-bold text-xl transition">+</button>

        <!-- Row 5 -->
        <button @click="appendNumber('0')" class="col-span-2 bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">0</button>
        <button @click="appendDecimal" class="bg-slate-800/40 border border-slate-800 text-slate-200 hover:bg-slate-700/40 active:scale-95 py-4 rounded-xl font-semibold text-lg transition">.</button>
        <button @click="calculate" class="bg-gradient-to-r from-teal-500 to-emerald-400 text-slate-950 font-extrabold text-xl shadow-[0_0_15px_rgba(20,184,166,0.3)] hover:brightness-110 active:scale-95 py-4 rounded-xl transition">=</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const { createApp, ref, onMounted, onUnmounted } = Vue;

      createApp({
        compilerOptions: { delimiters: ['[[', ']]'] },
        setup() {
          const displayValue = ref('0');
          const expression = ref('');
          let isResetOnNext = false;

          const clear = () => {
            displayValue.value = '0';
            expression.value = '';
            isResetOnNext = false;
          };

          const backspace = () => {
            if (isResetOnNext) {
              clear();
              return;
            }
            if (displayValue.value.length > 1) {
              displayValue.value = displayValue.value.slice(0, -1);
            } else {
              displayValue.value = '0';
            }
          };

          const toggleSign = () => {
            if (displayValue.value === '0') return;
            if (displayValue.value.startsWith('-')) {
              displayValue.value = displayValue.value.substring(1);
            } else {
              displayValue.value = '-' + displayValue.value;
            }
          };

          const appendNumber = (num) => {
            if (displayValue.value === '0' || isResetOnNext) {
              displayValue.value = num;
              isResetOnNext = false;
            } else {
              displayValue.value += num;
            }
          };

          const appendDecimal = () => {
            if (isResetOnNext) {
              displayValue.value = '0.';
              isResetOnNext = false;
              return;
            }
            if (!displayValue.value.includes('.')) {
              displayValue.value += '.';
            }
          };

          const appendOperator = (op) => {
            // If we have a pending result or an expression
            let val = displayValue.value;
            if (val.endsWith('.')) {
              val = val.slice(0, -1);
            }
            expression.value = `${val} ${op} `;
            isResetOnNext = true;
          };

          const calculate = () => {
            if (!expression.value || isResetOnNext) return;
            
            let val = displayValue.value;
            if (val.endsWith('.')) {
              val = val.slice(0, -1);
            }
            
            const fullExpr = expression.value + val;
            expression.value = fullExpr + ' =';
            
            // Safe evaluation of simple math expressions
            try {
              // Extract left, op, right safely
              const tokens = fullExpr.split(' ');
              if (tokens.length >= 3) {
                const left = parseFloat(tokens[0]);
                const op = tokens[1];
                const right = parseFloat(tokens[2]);
                
                let result = 0;
                if (op === '+') result = left + right;
                else if (op === '-') result = left - right;
                else if (op === '*') result = left * right;
                else if (op === '/') {
                  if (right === 0) {
                    displayValue.value = 'Error';
                    isResetOnNext = true;
                    return;
                  }
                  result = left / right;
                }
                
                // Limit decimals to 8 places to avoid floating point issues
                result = Math.round(result * 1e8) / 1e8;
                displayValue.value = String(result);
              }
            } catch (err) {
              displayValue.value = 'Error';
            }
            isResetOnNext = true;
          };

          // Keyboard support
          const handleKeyDown = (e) => {
            const key = e.key;
            if (key >= '0' && key <= '9') {
              appendNumber(key);
            } else if (key === '.') {
              appendDecimal();
            } else if (key === '+') {
              appendOperator('+');
            } else if (key === '-') {
              appendOperator('-');
            } else if (key === '*') {
              appendOperator('*');
            } else if (key === '/') {
              appendOperator('/');
            } else if (key === 'Enter' || key === '=') {
              calculate();
            } else if (key === 'Backspace') {
              backspace();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
              clear();
            }
          };

          onMounted(() => {
            window.addEventListener('keydown', handleKeyDown);
          });

          onUnmounted(() => {
            window.removeEventListener('keydown', handleKeyDown);
          });

          return {
            displayValue,
            expression,
            clear,
            backspace,
            toggleSign,
            appendNumber,
            appendDecimal,
            appendOperator,
            calculate
          };
        }
      }).mount('#app');
    })();
  </script>
</body>
</html>
