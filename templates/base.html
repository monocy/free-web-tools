<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ meta.site_title }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      plugins: [
        function({ addVariant }) {
          addVariant('theme-light', '.theme-light &')
          addVariant('theme-neon', '.theme-neon &')
        }
      ]
    }
  </script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    [v-cloak] { display: none; }
    :root {
      /* Dark Theme (default) */
      --bg-primary: #020617; /* slate-950 */
      --bg-card: rgba(15, 23, 42, 0.4);
      --border-color: #1e293b; /* slate-800 */
      --text-main: #f1f5f9; /* slate-100 */
      --text-muted: #94a3b8; /* slate-400 */
      --accent-color: #14b8a6; /* teal-500 */
    }

    .theme-light {
      --bg-primary: #f8fafc; /* slate-50 */
      --bg-card: rgba(255, 255, 255, 0.4);
      --border-color: #e2e8f0; /* slate-200 */
      --text-main: #0f172a; /* slate-900 */
      --text-muted: #64748b; /* slate-500 */
      --accent-color: #0d9488; /* teal-600 */
    }

    .theme-neon {
      --bg-primary: #09090b; /* zinc-950 */
      --bg-card: rgba(9, 9, 11, 0.8);
      --border-color: #f0abfc; /* fuchsia-400 */
      --text-main: #f0abfc;
      --text-muted: #c084fc;
      --accent-color: #d946ef; /* fuchsia-600 */
    }
  </style>
</head>
<body class="bg-[var(--bg-primary)] text-[var(--text-main)] bg-[var(--bg-primary)] text-[var(--text-main)] min-h-screen flex flex-col font-sans relative transition-colors duration-300">
  <div id="layout-app" class="flex-1 flex flex-col min-h-screen relative z-10">
    <!-- Custom Background Layer -->
    <div 
      class="fixed inset-0 z-0 pointer-events-none transition-all duration-300"
      :style="{
        backgroundImage: settings.bgUrl ? 'url(' + settings.bgUrl + ')' : 'none',
        backgroundSize: 'cover',
        backgroundPosition: 'center',
        opacity: settings.bgOpacity,
        filter: 'blur(' + settings.bgBlur + 'px)'
      }"
    ></div>

    <header class="border-b border-[var(--border-color)] bg-[var(--bg-card)] bg-[var(--bg-primary)] backdrop-blur sticky top-0 z-50 relative">
      <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500">
          [[ t('app_title', '{{ meta.site_title }}') ]]
        </a>
        <div class="flex items-center gap-2">
          <button @click="toggleTheme" class="p-2 text-[var(--text-muted)] hover:text-[var(--text-main)] theme-light:text-slate-700 theme-light:hover:text-slate-900 transition duration-200" :title="t('theme_toggle', 'Toggle Theme')">
            <svg v-if="settings.theme === 'dark' || settings.theme === 'neon'" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
            </svg>
            <svg v-else class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
          </button>
          <button @click="showSettings = true" class="p-2 text-[var(--text-muted)] hover:text-[var(--text-muted)] dark:hover:text-[var(--text-main)] theme-light:text-slate-700 theme-light:hover:text-slate-900 transition duration-200">
            <svg class="w-6 h-6 animate-[spin_10s_linear_infinite] hover:animate-[spin_2s_linear_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-8 relative z-10">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-[var(--border-color)] bg-[var(--bg-card)] bg-[var(--bg-primary)] py-6 mt-12 relative z-10">
      <div class="max-w-6xl mx-auto px-4 text-center text-sm text-[var(--text-muted)]">
        &copy; 2026 Free Web Tools · web-tools-100x
      </div>
    </footer>

    <!-- Settings Modal Component -->
    <settings-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="showSettings" 
      @close="showSettings = false"
      @reset="resetSettings"
      @open-bg-modal="isBgModalOpen = true"
    ></settings-modal>

    <!-- Background Modal Component -->
    <background-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="isBgModalOpen" 
      @close="isBgModalOpen = false"
    ></background-modal>

    <!-- Floating Fullscreen Button -->
    <button 
      @click="toggleFullscreen" 
      class="fixed bottom-3 right-3 z-40 w-8 h-8 bg-gradient-to-r from-teal-500 to-blue-500 hover:from-teal-400 hover:to-blue-400 text-white rounded-full shadow-lg hover:shadow-xl transition-all duration-300 transform hover:scale-105 flex items-center justify-center focus:outline-none opacity-40 hover:opacity-90"
      :title="t('fullscreen_toggle', 'Toggle Fullscreen')"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5"></path>
      </svg>
    </button>
  </div>

  <script type="module">
  import SettingsModal from '/static/js/settings_modal.js';
  import BackgroundModal from '/static/js/background_modal.js';

  const { createApp, ref, reactive, onMounted, watch } = Vue;
  createApp({
    delimiters: ['[[', ']]'],
    components: {
      SettingsModal,
      BackgroundModal
    },
    setup() {
      const translations = ref({});
      const showSettings = ref(false);
      const isBgModalOpen = ref(false);
      
      const settings = reactive({
        lang: 'en',
        theme: 'dark',
        bgUrl: '',
        bgOpacity: 0.3,
        bgBlur: 10,
        custom: {}
      });

      const loadTranslations = async () => {
        try {
          const res = await fetch('/i18n.json');
          if (res.ok) {
            translations.value = await res.json();
          }
        } catch (e) {
          console.error('Failed to load translations', e);
        }
      };

      const loadSettings = () => {
        const stored = localStorage.getItem('tool-settings');
        if (stored) {
          try {
            const parsed = JSON.parse(stored);
            Object.assign(settings, parsed);
          } catch (e) {
            console.error('Failed to parse settings', e);
          }
        } else {
          const browserLang = navigator.language || '';
          settings.lang = browserLang.startsWith('ja') ? 'ja' : 'en';
        }
      };

      const saveSettings = () => {
        localStorage.setItem('tool-settings', JSON.stringify(settings));
      };

      const applyTheme = (themeName) => {
        const root = document.documentElement;
        root.classList.remove('theme-light', 'theme-neon', 'dark');
        if (themeName === 'light') {
          root.classList.add('theme-light');
        } else if (themeName === 'neon') {
          root.classList.add('theme-neon');
          root.classList.add('dark');
        } else {
          root.classList.add('dark');
        }
      };

      watch(() => settings.theme, (newTheme) => {
        applyTheme(newTheme);
        saveSettings();
      });

      watch(() => settings.lang, (newLang) => {
        document.documentElement.lang = newLang;
        saveSettings();
      });

      watch(() => settings.bgUrl, saveSettings);
      watch(() => settings.bgOpacity, saveSettings);
      watch(() => settings.bgBlur, saveSettings);

      onMounted(async () => {
        loadSettings();
        applyTheme(settings.theme);
        document.documentElement.lang = settings.lang;
        await loadTranslations();
      });

      const t = (key, fallback = '') => {
        const parts = key.split('.');
        let current = translations.value[settings.lang];
        if (!current) return fallback || key;
        for (const part of parts) {
          current = current[part];
          if (current === undefined) return fallback || key;
        }
        return current;
      };

      const toggleFullscreen = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => {
            console.error(err);
          });
        } else {
          document.exitFullscreen();
        }
      };

      const resetSettings = () => {
        localStorage.removeItem('tool-settings');
        settings.lang = (navigator.language || '').startsWith('ja') ? 'ja' : 'en';
        settings.theme = 'dark';
        settings.bgUrl = '';
        settings.bgOpacity = 0.3;
        settings.bgBlur = 10;
        applyTheme(settings.theme);
      };

      const toggleTheme = () => {
        settings.theme = settings.theme === 'light' ? 'dark' : 'light';
      };

      return {
        settings,
        translations,
        showSettings,
        isBgModalOpen,
        t,
        toggleFullscreen,
        resetSettings,
        toggleTheme
      };
    }
  }).mount('#layout-app');
</script>
</body>
</html>
