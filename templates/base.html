<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ meta.site_title }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    [v-cloak] { display: none; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">
  <div id="layout-app" class="flex-1 flex flex-col">
    <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500">
          {{ meta.site_title }}
        </a>
      </div>
    </header>
    <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-8">
      {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-slate-800 bg-slate-950 py-6 mt-12">
      <div class="max-w-6xl mx-auto px-4 text-center text-sm text-slate-500">
        &copy; 2026 Webツール集 · web-tools-100x
      </div>
    </footer>
  </div>
</body>
</html>
