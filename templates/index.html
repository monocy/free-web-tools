{% extends "base.html" %}
{% block content %}
<div id="app" v-cloak class="space-y-12 relative">
  <!-- Glowing decorative backgrounds -->
  <div class="absolute w-[400px] h-[400px] rounded-full bg-teal-500/5 blur-[120px] top-[-100px] left-[-50px] pointer-events-none"></div>
  <div class="absolute w-[450px] h-[450px] rounded-full bg-blue-500/5 blur-[130px] bottom-[-150px] right-[-50px] pointer-events-none"></div>

  <!-- Hero Section -->
  <section class="text-center max-w-3xl mx-auto py-12 relative z-10 space-y-4">
    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800/60 border border-slate-700/50 text-xs font-semibold text-teal-400 tracking-wider uppercase mb-2">
      <span class="w-2 h-2 rounded-full bg-teal-400 animate-pulse"></span>
      Gen3 Asset Portal
    </div>
    <h1 class="text-4xl sm:text-5xl font-black tracking-tight bg-gradient-to-r from-teal-400 via-emerald-400 to-blue-500 bg-clip-text text-transparent">
      {{ meta.site_title }}
    </h1>
    <p class="text-base sm:text-lg text-slate-400 max-w-xl mx-auto leading-relaxed">
      {{ meta.slogan }}
    </p>
  </section>

  <!-- Tools Grid -->
  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 relative z-10">
    {% for tool in tools %}
    <div class="group bg-slate-950/40 backdrop-blur-md border border-slate-800/80 p-5 rounded-2xl hover:border-teal-500/40 hover:bg-slate-900/50 hover:shadow-[0_0_30px_rgba(20,184,166,0.05)] transition-all duration-300 flex flex-col justify-between">
      <div>
        <!-- Thumbnail Preview Frame -->
        <div class="w-full aspect-[16/10] rounded-xl bg-slate-900 border border-slate-800/80 overflow-hidden mb-4 relative flex items-center justify-center group-hover:border-teal-500/20 transition duration-300">
          <div class="absolute inset-0 bg-gradient-to-br from-slate-900 to-slate-950 flex items-center justify-center text-3xl select-none text-slate-700 opacity-60">
            {{ tool.icon }}
          </div>
          <img src="/static/thumbnails/{{ tool.id }}.png" 
               alt="{{ tool.name }}" 
               class="w-full h-full object-cover relative z-10 transition duration-500 group-hover:scale-105"
               onerror="this.style.display='none';">
        </div>

        <!-- ID and Meta -->
        <div class="flex justify-between items-center mb-2">
          <span class="text-[10px] font-bold text-slate-600 tracking-widest uppercase font-mono">
            // {{ tool.id }}
          </span>
          <span class="text-[10px] font-bold text-teal-400 bg-teal-400/5 border border-teal-500/10 px-2 py-0.5 rounded">
            ACTIVE
          </span>
        </div>
        
        <!-- Tool Title -->
        <h2 class="text-lg font-bold text-slate-100 group-hover:text-teal-400 transition duration-300 mb-2">
          {{ tool.name }}
        </h2>
        
        <!-- Tool Description -->
        <p class="text-slate-400 text-sm leading-relaxed mb-6">
          {{ tool.description }}
        </p>
      </div>

      <!-- Action Button -->
      <div class="pt-2 border-t border-slate-900/60 flex justify-between items-center">
        <span class="text-[10px] font-semibold text-slate-500 tracking-wide">
          WEB-APP
        </span>
        <a href="/tools/{{ tool.id }}" class="inline-flex items-center gap-1 text-sm font-bold text-teal-400 hover:text-teal-300 transition duration-200">
          ツールを開く 
          <span class="group-hover:translate-x-1 transition duration-200">&rarr;</span>
        </a>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<script>
(() => {
  const { createApp } = Vue;
  createApp({
    setup() {
      return {};
    }
  }).mount('#app');
})();
</script>
{% endblock %}
