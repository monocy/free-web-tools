{% extends "base.html" %}
{% block content %}
<div id="app" v-cloak class="space-y-8">
  <section class="text-center max-w-2xl mx-auto py-8">
    <h1 class="text-4xl font-extrabold tracking-tight mb-4 bg-gradient-to-r from-teal-400 via-emerald-400 to-blue-500 bg-clip-text text-transparent">
      {{ meta.site_title }}
    </h1>
    <p class="text-lg text-slate-400">
      {{ meta.slogan }}
    </p>
  </section>

  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for tool in tools %}
    <div class="bg-slate-800/50 border border-slate-700/50 p-6 rounded-lg hover:border-teal-500/50 transition duration-300">
      <h2 class="text-xl font-semibold text-teal-400 mb-2">{{ tool.name }}</h2>
      <p class="text-slate-400 text-sm mb-4">{{ tool.description }}</p>
      <a href="/tools/{{ tool.id }}" class="text-sm font-semibold text-blue-400 hover:text-blue-300">ツールを開く &rarr;</a>
    </div>
    {% endfor %}
  </div>
</div>

<script>
(() => {
  const { createApp } = Vue;
  createApp({
    setup() {
      return {};
    }
  }).mount('#app');
})();
</script>
{% endblock %}
